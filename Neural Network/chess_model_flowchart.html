<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chess policy network — architecture and tensor flow</title>
<style>
:root{--bg:#f2f2f2;--panel:#ffffff;--ink:#1d1d1d;--mut:#6a6a6a;--line:#d9d9d9;--hl:#c8641e}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.6 "Segoe UI",system-ui,sans-serif}
header{padding:18px 26px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:5;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
header h1{font-size:17px;font-weight:600;margin:0}
header p{margin:0;color:var(--mut);font-size:13px}
button{font:13px "Segoe UI",system-ui,sans-serif;padding:7px 14px;border:1px solid #bdbdbd;background:#fff;border-radius:6px;cursor:pointer}
button:hover{background:#f6f6f6}
.wrap{display:flex;align-items:flex-start}
.gcol{flex:1;overflow-x:auto;padding:10px 0 60px}
#graph{display:block;margin:0 auto;max-width:100%;height:auto}
.edge{stroke:#4b4b4b;stroke-width:1.4}
.elbl{font-size:12px;fill:#1f4bd8;font-family:Consolas,monospace}
.io{fill:#efefef;stroke:#8a8a8a;stroke-width:1.2}
.iotxt{font-size:14px;text-anchor:middle;fill:#1d1d1d}
.body{fill:#fff}
.outline{fill:none;stroke:#5a5a5a;stroke-width:1.2}
.hdr{font-size:13px;fill:#fff;font-weight:600}
.row{font-size:12px;fill:#333;font-family:Consolas,monospace}
.rowb{font-size:12px;fill:#111;font-weight:700}
.node{cursor:pointer}
.node:focus{outline:none}
.node.sel .outline,.node:focus .outline{stroke:var(--hl);stroke-width:2.6}
aside{width:400px;max-width:46vw;position:sticky;top:64px;background:var(--panel);border-left:1px solid var(--line);padding:18px 20px;height:calc(100vh - 64px);overflow-y:auto}
aside h2{font-size:15px;margin:0 0 2px}
.shape{font-family:Consolas,monospace;font-size:12.5px;color:var(--mut)}
.cap{font-size:12.5px;color:var(--mut);margin:8px 0 12px}
.formula{background:#f7f5f0;border:1px solid #e4e0d5;border-radius:8px;padding:10px 12px;font-family:Consolas,monospace;font-size:13px;margin:0 0 14px;overflow-x:auto}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px}
.cell{border-radius:3px;text-align:center;font:10.5px Consolas,monospace;padding:6px 0}
.cell.sm{padding:3px 0;font-size:9.5px;letter-spacing:-0.3px}
.stats{font-family:Consolas,monospace;font-size:12px;color:var(--mut);margin-top:10px}
.bar{display:flex;align-items:center;gap:8px;margin:4px 0;font-family:Consolas,monospace;font-size:12.5px}
.bar .tr{flex:1;background:#eee;border-radius:3px;height:16px}.bar .fl{height:100%;background:#4d9e7c;border-radius:3px}
.note{font-size:12px;color:var(--mut)}
.strip{display:flex;flex-wrap:wrap;gap:3px;font-family:Consolas,monospace;font-size:11px}
.strip span{padding:3px 5px;border-radius:3px}
@media (max-width:820px){.wrap{flex-direction:column}aside{position:static;width:100%;max-width:none;height:auto;border-left:none;border-top:1px solid var(--line)}}
@media print{aside{display:none}}
</style>
</head>
<body>
<header>
  <div style="flex:1;min-width:220px">
    <h1>Chess policy network — chess_model.tflite</h1>
    <p>TinyChessNet (PyTorch, BatchNorm folded) → ONNX → int8 TFLite for ESP32-S3. Click any node for its real tensor values (starting position, channel 0, dequantized).</p>
  </div>
  <button id="walk">▶ Walk through</button>
  <label style="font-size:13px;color:var(--mut)"><input type="checkbox" id="nums" checked> values</label>
</header>

 else if(s.kind==='flat'){h+='<div class="strip">';s.head.forEach(v=>{const c=col(v,2);h+='<span style="background:'+c[0]+';color:'+c[1]+'">'+v.toFixed(2)+'</span>';});h+='<span style="color:#999">… 1512 more</span></div>';}
 else{const g=s.ch0,rows=g.length,tall=rows>8,mx=Math.max(...g.flat().map(Math.abs));
  h+='<div class="grid">';
  for(let i=rows-1;i>=0;i--)for(let j=0;j<8;j++){const v=g[i][j],c=col(v,mx);
   h+='<div class="cell'+(tall?' sm':'')+'" style="background:'+c[0]+';color:'+c[1]+'">'+(showN?v.toFixed(2):'&nbsp;')+'</div>';}
  h+='</div>';
  h+='<p class="note">'+(tall?'24 channel-rows × 8 — same numbers as the previous stage, new order':'rows drawn rank 8 (top) → rank 1 (bottom)')+'</p>';}
 h+='<div class="stats">full tensor: min '+s.stats[0].toFixed(2)+' · max '+s.stats[1].toFixed(2)+' · mean '+s.stats[2].toFixed(2)+'</div>';
 p.innerHTML=h;}
const nodes=[...document.querySelectorAll('.node')];
function select(n){nodes.forEach(x=>x.classList.remove('sel'));n.classList.add('sel');sel=nodes.indexOf(n);show(+n.dataset.s);}
nodes.forEach(n=>{n.addEventListener('click',()=>select(n));n.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();select(n);}});});
document.getElementById('nums').addEventListener('change',()=>{if(sel>=0)show(+nodes[sel].dataset.s);});
let wt=null;
document.getElementById('walk').addEventListener('click',function(){
 if(wt){clearInterval(wt);wt=null;this.textContent='▶ Walk through';return;}
 let i=0;this.textContent='⏸ Pause';
 const step=()=>{if(i>=nodes.length){clearInterval(wt);wt=null;document.getElementById('walk').textContent='▶ Walk through';return;}
  select(nodes[i]);nodes[i].scrollIntoView({behavior:'smooth',block:'center'});i++;};
 step();wt=setInterval(step,1600);});
select(nodes[0]);
</script>
